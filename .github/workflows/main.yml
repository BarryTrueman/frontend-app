name: Frontend App CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Echo a message
        run: echo "Building the frontend-app..."
      - name: Simple Build Step
        run: |
          echo "Installing dependencies..."
          npm install
          echo "Running build..."
          npm run build